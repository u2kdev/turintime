<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TTPU Schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f6f2;--white:#fff;--ink:#111;--muted:#888;
  --border:#e8e8e4;--blue:#2563eb;
  --sidebar:240px;--topbar:56px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* TOP BAR */
.topbar{height:var(--topbar);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px 0 0;gap:0;flex-shrink:0;z-index:30}
.topbar-logo{width:var(--sidebar);flex-shrink:0;display:flex;align-items:center;gap:10px;padding:0 20px;border-right:1px solid var(--border);height:100%}
.logo-mark{width:28px;height:28px;background:var(--blue);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:11px;flex-shrink:0}
.logo-text{font-weight:600;font-size:14px}
.topbar-center{flex:1;display:flex;align-items:center;gap:12px;padding:0 20px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.topbar-center::-webkit-scrollbar{display:none}
.week-nav{display:flex;align-items:center;gap:6px;flex-shrink:0}
.week-btn{width:28px;height:28px;border:1px solid var(--border);border-radius:7px;background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:background .1s;flex-shrink:0}
.week-btn:hover{background:var(--bg)}
.week-label{font-size:14px;font-weight:600;min-width:140px;text-align:center;white-space:nowrap}
.today-btn{padding:5px 12px;background:var(--blue);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;flex-shrink:0}
.topbar-right{display:flex;align-items:center;gap:10px;margin-left:auto;flex-shrink:0}
.user-pill{display:flex;align-items:center;gap:8px;padding:5px 12px 5px 5px;border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:13px;white-space:nowrap}
.user-pill img{width:24px;height:24px;border-radius:50%}
.logout-btn{padding:5px 12px;border:1px solid var(--border);border-radius:7px;font-size:12px;background:var(--white);cursor:pointer;color:var(--muted);font-family:inherit;white-space:nowrap}
.logout-btn:hover{border-color:#bbb;color:var(--ink)}
.topbar-controls{display:flex;align-items:center;gap:6px;margin-left:8px;flex-shrink:0}
.t-lang{display:flex;border:1px solid var(--border);border-radius:7px;overflow:hidden}
.t-lang-btn{padding:4px 8px;font-size:10px;font-weight:600;color:var(--muted);cursor:pointer;border:none;background:transparent;font-family:inherit;letter-spacing:.04em}
.t-lang-btn.active{background:var(--blue);color:#fff}
.t-theme-btn{width:28px;height:28px;border:1px solid var(--border);border-radius:7px;background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:var(--sidebar);flex-shrink:0;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-head{padding:14px 16px 10px;border-bottom:1px solid var(--border)}
.sidebar-title{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.search-box{width:100%;padding:8px 10px 8px 30px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;outline:none;background:var(--bg);transition:border-color .15s;color:var(--ink)}
.search-box:focus{border-color:var(--blue);background:var(--white)}
.search-wrap{position:relative}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none}
.groups-list{flex:1;overflow-y:auto;padding:6px}
.groups-list::-webkit-scrollbar{width:3px}
.groups-list::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
.group-item{padding:8px 10px;border-radius:7px;cursor:pointer;font-size:13px;color:#444;transition:all .1s;display:flex;align-items:center;gap:8px;border:1.5px solid transparent}
.group-item:hover{background:var(--bg);color:var(--ink)}
.group-item.active{background:#eff4ff;color:var(--blue);border-color:#dbeafe;font-weight:500}
.g-dot{width:7px;height:7px;border-radius:50%;background:#ddd;flex-shrink:0}
.group-item.active .g-dot{background:var(--blue)}
.sidebar-footer{padding:10px 14px;border-top:1px solid var(--border);font-size:11px;color:#bbb}

/* CALENDAR AREA */
.cal-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* DAY HEADER ROW */
.cal-header{display:grid;grid-template-columns:64px repeat(6,1fr);border-bottom:1px solid var(--border);background:var(--white);flex-shrink:0}
.cal-header-cell{padding:10px 8px;text-align:center;font-size:12px;font-weight:500;border-right:1px solid var(--border)}
.cal-header-cell:last-child{border-right:none}
.cal-day-num{font-size:20px;font-weight:600;line-height:1;display:block}
.cal-day-name{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-top:2px;display:block}
.cal-header-cell.today{color:var(--blue)}
.cal-header-cell.today .cal-day-num{width:32px;height:32px;background:var(--blue);color:#fff;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:16px}

/* CALENDAR GRID */
.cal-body{flex:1;overflow-y:auto;position:relative}
[data-theme="dark"]{
  --bg:#0f1117; --white:#1a1d27; --ink:#e8e9f0; --muted:#5a5c72;
  --border:rgba(255,255,255,.08); --blue:#818cf8; --blue-bg:rgba(129,140,248,.12);
}
::-webkit-scrollbar{width:4px}
.cal-body::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
.cal-grid{display:grid;grid-template-columns:64px repeat(6,1fr);min-height:100%}
.cal-time-col{border-right:1px solid var(--border)}
.cal-time-slot{height:80px;display:flex;align-items:flex-start;padding:6px 8px 0;font-size:11px;color:var(--muted);border-bottom:1px solid #f0f0ec;font-weight:500}
.cal-day-col{border-right:1px solid var(--border);position:relative}
.cal-day-col:last-child{border-right:none}
.cal-cell{height:80px;border-bottom:1px solid #f0f0ec;position:relative;padding:3px}

/* EVENT CARDS */
.event{border-radius:6px;padding:5px 8px;font-size:11px;line-height:1.35;cursor:pointer;border-left:3px solid;overflow:hidden;height:100%;transition:opacity .1s}
.event:hover{opacity:.85}
.event-subj{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.event-room{opacity:.7;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.event-teacher{opacity:.6;font-size:10px;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.ec0{background:#dbeafe;border-color:#2563eb;color:#1e3a8a}
.ec1{background:#dcfce7;border-color:#16a34a;color:#14532d}
.ec2{background:#fef3c7;border-color:#d97706;color:#78350f}
.ec3{background:#fce7f3;border-color:#db2777;color:#831843}
.ec4{background:#ede9fe;border-color:#7c3aed;color:#3b0764}
.ec5{background:#ffedd5;border-color:#ea580c;color:#7c2d12}
.ec6{background:#e0f2fe;border-color:#0284c7;color:#0c4a6e}
.ec7{background:#f0fdf4;border-color:#15803d;color:#052e16}

/* NOW LINE */
.now-line{position:absolute;left:0;right:0;height:2px;background:#ef4444;z-index:10;pointer-events:none}
.now-dot{position:absolute;left:-4px;top:-4px;width:10px;height:10px;background:#ef4444;border-radius:50%}

/* EMPTY STATE */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:12px}
.empty-icon{font-size:40px;opacity:.4}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:10px}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* GROUP PICKER MODAL */
.gpicker{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.gpicker.open{display:flex}
.gpicker-box{background:#fff;border-radius:16px;padding:24px;width:420px;max-height:80vh;display:flex;flex-direction:column;animation:popIn .2s ease}
@keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.gpicker-title{font-size:16px;font-weight:600;margin-bottom:16px}
.gpicker-search{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;outline:none;margin-bottom:12px}
.gpicker-search:focus{border-color:var(--blue)}
.gpicker-list{flex:1;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.gpicker-list::-webkit-scrollbar{width:3px}
.gpicker-list::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
.gp-item{padding:9px 12px;border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;transition:all .1s}
.gp-item:hover{border-color:var(--blue);color:var(--blue);background:#eff4ff}

/* ── MOBILE DAY VIEW ── */
.mobile-day-view{display:none;flex:1;flex-direction:column;overflow:hidden}
.mobile-day-tabs{display:flex;overflow-x:auto;gap:6px;padding:10px 14px;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0;-webkit-overflow-scrolling:touch}
.mobile-day-tabs::-webkit-scrollbar{display:none}
.mobile-day-tab{flex-shrink:0;padding:7px 12px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:inherit;transition:all .1s;white-space:nowrap}
.mobile-day-tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.mobile-day-tab.today-tab{border-color:var(--blue);color:var(--blue)}
.mobile-lessons{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.mobile-lesson-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px;border-left:4px solid var(--blue)}
.ml-time{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500}
.ml-subj{font-size:15px;font-weight:600;margin-bottom:6px}
.ml-info{display:flex;flex-wrap:wrap;gap:8px}
.ml-badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--muted);background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:3px 8px}
.ml-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;color:var(--muted);gap:8px;text-align:center}
.ml-current{border-left-color:#22c55e;background:rgba(34,197,94,.04)}
.ml-current-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:#16a34a;background:#dcfce7;border-radius:4px;padding:2px 6px;margin-bottom:4px}

/* Mobile bottom bar */
.mobile-bottom-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);padding:8px 14px 12px;z-index:50;gap:8px}
.mob-group-btn{flex:1;padding:10px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.mob-logout-btn{padding:10px 16px;border:1px solid var(--border);border-radius:10px;font-size:13px;background:var(--white);cursor:pointer;color:var(--muted);font-family:inherit}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .sidebar{display:none}
  .topbar-logo{display:none}
  body{height:100dvh}

  /* Topbar compact */
  .topbar{height:50px;padding:0 10px;gap:8px}
  .topbar-center{padding:0 8px;gap:8px}
  .week-label{min-width:110px;font-size:12px}
  .week-btn{width:26px;height:26px;font-size:12px}
  .today-btn{padding:4px 10px;font-size:11px}
  .t-lang-btn{padding:3px 6px;font-size:9px}
  .t-theme-btn{width:26px;height:26px;font-size:11px}
  .user-pill{display:none}
  .logout-btn{display:none}
  .topbar-controls{margin-left:0}

  /* Group btn in topbar */
  #group-btn{font-size:11px;padding:4px 8px;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* Desktop calendar — hidden on mobile */
  .cal-wrap{display:none}

  /* Mobile day view shown */
  .mobile-day-view{display:flex}

  /* Bottom bar */
  .mobile-bottom-bar{display:flex}

  /* Group picker full screen on mobile */
  .gpicker.open{align-items:flex-end}
  .gpicker-box{width:100%;max-width:100%;border-radius:20px 20px 0 0;padding-bottom:32px;max-height:85vh}
  @keyframes popIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
  .gpicker-list{grid-template-columns:1fr 1fr}
  .gp-item{padding:11px 12px;font-size:14px}

  /* Extra bottom padding for fixed bar */
  .mobile-lessons{padding-bottom:80px}
}

@media(max-width:480px){
  .week-label{min-width:90px;font-size:11px}
  #group-btn{max-width:70px;font-size:10px}
  .topbar-center{gap:4px;padding:0 4px}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo">
    <div class="logo-mark">TT</div>
    <span class="logo-text">TTPU Schedule</span>
  </div>
  <div class="topbar-center">
    <div class="week-nav">
      <button class="week-btn" onclick="shiftWeek(-1)">‹</button>
      <span class="week-label" id="week-label">—</span>
      <button class="week-btn" onclick="shiftWeek(1)">›</button>
    </div>
    <button class="today-btn" onclick="goToday()">Сегодня</button>
    <button class="btn-group-pick" onclick="openGroupPicker()" style="padding:5px 12px;border:1px solid var(--border);border-radius:7px;font-size:12px;background:#fff;cursor:pointer;font-family:inherit;color:var(--ink)" id="group-btn">
      — Группа —
    </button>
  </div>
  <div class="topbar-right">
    <div class="user-pill" id="user-info"></div>
    <div class="topbar-controls">
      <div class="t-lang">
        <button class="t-lang-btn" data-l="ru" onclick="setLang('ru')">RU</button>
        <button class="t-lang-btn" data-l="uz" onclick="setLang('uz')">UZ</button>
        <button class="t-lang-btn" data-l="en" onclick="setLang('en')">EN</button>
      </div>
      <button class="t-theme-btn" id="theme-btn" onclick="toggleTheme()">☀️</button>
    </div>
    <button class="logout-btn" onclick="location.href='/logout'">Выйти</button>
  </div>
</div>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-title">Группы</div>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input class="search-box" id="sidebar-search" placeholder="Поиск..." oninput="filterSidebar(this.value)">
      </div>
    </div>
    <div class="groups-list" id="sidebar-groups"></div>
    <div class="sidebar-footer" id="sidebar-footer">—</div>
  </div>

  <!-- DESKTOP CALENDAR -->
  <div class="cal-wrap">
    <div class="cal-header" id="cal-header"></div>
    <div class="cal-body" id="cal-body">
      <div class="loading"><div class="spinner"></div> Загрузка...</div>
    </div>
  </div>

  <!-- MOBILE DAY VIEW -->
  <div class="mobile-day-view" id="mobile-day-view">
    <div class="mobile-day-tabs" id="mobile-day-tabs"></div>
    <div class="mobile-lessons" id="mobile-lessons">
      <div class="ml-empty"><span style="font-size:36px;opacity:.3">📅</span><span>Выбери группу</span></div>
    </div>
  </div>
</div>

<!-- MOBILE BOTTOM BAR -->
<div class="mobile-bottom-bar">
  <button class="mob-group-btn" onclick="openGroupPicker()" id="mob-group-btn">— Выбрать группу —</button>
  <button class="mob-logout-btn" onclick="location.href='/logout'">Выйти</button>
</div>

<!-- GROUP PICKER MODAL -->
<div class="gpicker" id="gpicker" onclick="closePickerOutside(event)">
  <div class="gpicker-box">
    <div class="gpicker-title">Выбрать группу</div>
    <input class="gpicker-search" id="gpicker-search" placeholder="SEN2-25, IT1-22…" oninput="filterPicker(this.value)">
    <div class="gpicker-list" id="gpicker-list"></div>
  </div>
</div>

<script>
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAYS_RU = {Monday:'Пн',Tuesday:'Вт',Wednesday:'Ср',Thursday:'Чт',Friday:'Пт',Saturday:'Сб'};
const DAYS_FULL_RU = {Monday:'Понедельник',Tuesday:'Вторник',Wednesday:'Среда',Thursday:'Четверг',Friday:'Пятница',Saturday:'Суббота'};
const SLOTS = [
  {n:1,s:'09:00',e:'10:20'},{n:2,s:'10:30',e:'11:50'},{n:3,s:'12:00',e:'13:20'},
  {n:4,s:'14:20',e:'15:40'},{n:5,s:'15:50',e:'17:10'},{n:6,s:'17:20',e:'18:40'},
  {n:7,s:'18:50',e:'20:10'},{n:8,s:'20:20',e:'21:40'},
];
const COLORS = ['ec0','ec1','ec2','ec3','ec4','ec5','ec6','ec7'];
const colorMap = {};
let colorIdx = 0;

function subjectColor(subj) {
  if (!colorMap[subj]) colorMap[subj] = COLORS[colorIdx++ % COLORS.length];
  return colorMap[subj];
}

// Border colors for mobile cards
const BORDER_COLORS = ['#2563eb','#16a34a','#d97706','#db2777','#7c3aed','#ea580c','#0284c7','#15803d'];
function subjectBorderColor(subj) {
  const keys = Object.keys(colorMap);
  const idx = keys.indexOf(subj);
  return BORDER_COLORS[idx % BORDER_COLORS.length] || '#2563eb';
}

let currentGroupId   = '';
let currentGroupName = '';
let currentSchedule  = {};
let allGroupsList    = [];
let weekOffset       = 0;
let activeMobileDay  = '';

const today   = new Date();
const todayStr = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][today.getDay()];

// ── INIT ──────────────────────────────────────────────────────────────────
async function init() {
  const [me, groups, meta] = await Promise.all([
    fetch('/api/me').then(r=>r.json()),
    fetch('/api/groups').then(r=>r.json()),
    fetch('/api/meta').then(r=>r.json()),
  ]);

  if (!me.authenticated) { location.href = '/'; return; }

  document.getElementById('user-info').innerHTML =
    `${me.picture ? `<img src="${me.picture}" onerror="this.style.display='none'">` : ''} ${me.name.split(' ')[0]}`;

  allGroupsList = groups;
  renderSidebarGroups(groups);
  renderPickerGroups(groups);
  document.getElementById('sidebar-footer').textContent =
    `${meta.total_groups} групп · ${meta.updated_at}`;

  // Set active mobile day to today or Monday
  activeMobileDay = DAYS.includes(todayStr) ? todayStr : 'Monday';

  if (me.group_id) {
    await loadGroup(me.group_id, me.group_name);
  } else {
    renderCalendarEmpty();
    renderMobileDayTabs();
  }

  renderCalHeader();
  updateWeekLabel();
  startNowLine();
}

// ── GROUP LOAD ────────────────────────────────────────────────────────────
async function loadGroup(gid, gname) {
  currentGroupId   = gid;
  currentGroupName = gname;
  document.getElementById('group-btn').textContent = gname;
  document.getElementById('mob-group-btn').textContent = '📅 ' + gname;

  document.querySelectorAll('.group-item').forEach(el => {
    el.classList.toggle('active', el.dataset.gid === gid);
  });

  document.getElementById('cal-body').innerHTML =
    '<div class="loading"><div class="spinner"></div> Загрузка расписания...</div>';
  document.getElementById('mobile-lessons').innerHTML =
    '<div class="loading"><div class="spinner" style="width:16px;height:16px;border-width:2px"></div> Загрузка...</div>';

  try {
    const data = await fetch(`/api/timetable/${encodeURIComponent(gid)}`).then(r=>r.json());
    currentSchedule = data.schedule || {};
    renderCalBody();
    renderMobileDayTabs();
    renderMobileLessons(activeMobileDay);
    fetch('/api/me/group', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({group_id: gid, group_name: gname})});
  } catch(e) {
    document.getElementById('cal-body').innerHTML =
      '<div class="empty-state"><div class="empty-icon">⚠️</div>Ошибка загрузки</div>';
    document.getElementById('mobile-lessons').innerHTML =
      '<div class="ml-empty"><span style="font-size:28px;opacity:.3">⚠️</span><span>Ошибка загрузки</span></div>';
  }
}

// ── MOBILE DAY TABS ───────────────────────────────────────────────────────
function renderMobileDayTabs() {
  const tabs = document.getElementById('mobile-day-tabs');
  tabs.innerHTML = DAYS.map(day => {
    const cnt = (currentSchedule[day] || []).length;
    const isToday = day === todayStr;
    const isActive = day === activeMobileDay;
    return `<button class="mobile-day-tab${isActive?' active':''}${isToday&&!isActive?' today-tab':''}"
      onclick="switchMobileDay('${day}')">
      ${DAYS_RU[day]}${cnt > 0 ? ` (${cnt})` : ''}${isToday ? ' •' : ''}
    </button>`;
  }).join('');
}

function switchMobileDay(day) {
  activeMobileDay = day;
  renderMobileDayTabs();
  renderMobileLessons(day);
}

// ── MOBILE LESSONS ────────────────────────────────────────────────────────
function currentPeriod() {
  const now = new Date();
  const mins = now.getHours() * 60 + now.getMinutes();
  for (const slot of SLOTS) {
    const [sh, sm] = slot.s.split(':').map(Number);
    const [eh, em] = slot.e.split(':').map(Number);
    if (mins >= sh*60+sm && mins <= eh*60+em) return slot.n;
  }
  return 0;
}

function renderMobileLessons(day) {
  const lessons = currentSchedule[day] || [];
  const container = document.getElementById('mobile-lessons');
  const nowPeriod = (day === todayStr && weekOffset === 0) ? currentPeriod() : 0;

  if (!currentGroupId) {
    container.innerHTML = '<div class="ml-empty"><span style="font-size:36px;opacity:.3">📅</span><span>Выбери группу</span></div>';
    return;
  }

  if (!lessons.length) {
    container.innerHTML = `<div class="ml-empty"><span style="font-size:36px;opacity:.3">🎉</span><span>Пар нет — свободный день!</span></div>`;
    return;
  }

  // Get unique color for each subject (preload)
  lessons.forEach(l => subjectColor(l.subject_name || l.subject_short || ''));

  container.innerHTML = lessons.map(l => {
    const isCurrent = l.period === nowPeriod;
    const borderColor = subjectBorderColor(l.subject_name || l.subject_short || '');
    return `<div class="mobile-lesson-card${isCurrent ? ' ml-current' : ''}" style="border-left-color:${borderColor}">
      ${isCurrent ? '<div class="ml-current-badge">▶ Сейчас идёт</div>' : ''}
      <div class="ml-time">${l.period}. пара · ${l.time_start} – ${l.time_end}</div>
      <div class="ml-subj">${l.subject_name || l.subject_short || '—'}</div>
      <div class="ml-info">
        ${l.room_name ? `<span class="ml-badge">🚪 ${l.room_name}</span>` : ''}
        ${l.teacher_name ? `<span class="ml-badge">👤 ${l.teacher_name}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ── CALENDAR HEADER ───────────────────────────────────────────────────────
function renderCalHeader() {
  const monday = getMondayOfWeek(weekOffset);
  const el = document.getElementById('cal-header');
  let html = '<div class="cal-header-cell" style="border-right:1px solid var(--border)"></div>';
  DAYS.forEach((day, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    const isToday = isSameDay(d, today);
    html += `<div class="cal-header-cell${isToday?' today':''}">
      <span class="cal-day-num">${d.getDate()}</span>
      <span class="cal-day-name">${DAYS_RU[day]}</span>
    </div>`;
  });
  el.innerHTML = html;
}

// ── CALENDAR BODY ─────────────────────────────────────────────────────────
function renderCalBody() {
  const body = document.getElementById('cal-body');
  let html = '<div class="cal-grid" id="cal-grid">';

  html += '<div class="cal-time-col">';
  SLOTS.forEach(s => { html += `<div class="cal-time-slot">${s.s}</div>`; });
  html += '</div>';

  DAYS.forEach((day) => {
    const dayLessons = currentSchedule[day] || [];
    html += '<div class="cal-day-col">';
    SLOTS.forEach((slot) => {
      const lesson = dayLessons.find(l => l.period === slot.n);
      if (lesson) {
        const col = subjectColor(lesson.subject_name || lesson.subject_short);
        html += `<div class="cal-cell">
          <div class="event ${col}">
            <div class="event-subj">${lesson.subject_name || lesson.subject_short || '—'}</div>
            ${lesson.room_name  ? `<div class="event-room">🚪 ${lesson.room_name}</div>` : ''}
            ${lesson.teacher_name ? `<div class="event-teacher">👤 ${lesson.teacher_name}</div>` : ''}
          </div>
        </div>`;
      } else {
        html += '<div class="cal-cell"></div>';
      }
    });
    html += '</div>';
  });
  html += '</div>';
  body.innerHTML = html;
  positionNowLine();
}

function renderCalendarEmpty() {
  document.getElementById('cal-body').innerHTML =
    '<div class="empty-state"><div class="empty-icon">📅</div>Выбери группу слева</div>';
}

// ── WEEK NAVIGATION ───────────────────────────────────────────────────────
function getMondayOfWeek(offset = 0) {
  const d = new Date(today);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff + offset * 7);
  d.setHours(0,0,0,0);
  return d;
}

function updateWeekLabel() {
  const mon = getMondayOfWeek(weekOffset);
  const sat = new Date(mon); sat.setDate(mon.getDate() + 5);
  const fmt = d => d.toLocaleDateString('ru', {day:'numeric',month:'short'});
  document.getElementById('week-label').textContent = `${fmt(mon)} – ${fmt(sat)}`;
}

function shiftWeek(d) {
  weekOffset += d;
  updateWeekLabel();
  renderCalHeader();
}

function goToday() {
  weekOffset = 0;
  updateWeekLabel();
  renderCalHeader();
  // Also switch mobile view to today
  if (DAYS.includes(todayStr)) {
    switchMobileDay(todayStr);
  }
}

function isSameDay(a, b) {
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}

// ── NOW LINE ──────────────────────────────────────────────────────────────
function positionNowLine() {
  if (weekOffset !== 0) return;
  const now  = new Date();
  const mins = now.getHours() * 60 + now.getMinutes();
  const startMins = 9 * 60;
  const endMins   = 21 * 60 + 40;
  if (mins < startMins || mins > endMins) return;

  const totalMins = endMins - startMins;
  const pct = (mins - startMins) / totalMins;
  const grid = document.getElementById('cal-grid');
  if (!grid) return;
  const totalH = SLOTS.length * 80;
  const top    = pct * totalH;

  const todayIdx = DAYS.indexOf(todayStr);
  if (todayIdx < 0) return;

  const cols = grid.querySelectorAll('.cal-day-col');
  const col  = cols[todayIdx];
  if (!col) return;

  const line = document.createElement('div');
  line.className = 'now-line';
  line.style.top = `${top}px`;
  line.innerHTML = '<div class="now-dot"></div>';
  col.appendChild(line);

  const body = document.getElementById('cal-body');
  body.scrollTop = Math.max(0, top - 120);
}

function startNowLine() {
  positionNowLine();
  setInterval(() => {
    document.querySelectorAll('.now-line').forEach(el => el.remove());
    positionNowLine();
    // Refresh mobile current lesson highlight
    if (currentGroupId) renderMobileLessons(activeMobileDay);
  }, 60000);
}

// ── SIDEBAR GROUPS ────────────────────────────────────────────────────────
function renderSidebarGroups(list) {
  document.getElementById('sidebar-groups').innerHTML = list.map(g => `
    <div class="group-item${g.id===currentGroupId?' active':''}" data-gid="${g.id}" onclick="loadGroup('${g.id}','${g.name}')">
      <div class="g-dot"></div>${g.name}
    </div>`).join('') || '<div style="padding:16px;font-size:13px;color:var(--muted)">Не найдено</div>';
}

function filterSidebar(q) {
  const f = allGroupsList.filter(g => g.name.toLowerCase().includes(q.toLowerCase()));
  renderSidebarGroups(f);
}

// ── GROUP PICKER ──────────────────────────────────────────────────────────
function renderPickerGroups(list) {
  document.getElementById('gpicker-list').innerHTML = list.map(g =>
    `<div class="gp-item" onclick="pickGroup('${g.id}','${g.name}')">${g.name}</div>`
  ).join('');
}

function filterPicker(q) {
  const f = allGroupsList.filter(g => g.name.toLowerCase().includes(q.toLowerCase()));
  renderPickerGroups(f);
}

function openGroupPicker() {
  document.getElementById('gpicker').classList.add('open');
  setTimeout(() => document.getElementById('gpicker-search').focus(), 100);
}

function closeGroupPicker() {
  document.getElementById('gpicker').classList.remove('open');
}

function closePickerOutside(e) {
  if (e.target.id === 'gpicker') closeGroupPicker();
}

async function pickGroup(gid, gname) {
  closeGroupPicker();
  await loadGroup(gid, gname);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeGroupPicker();
});

init();

// ── THEME & LANG ──────────────────────────────────────────────────────────
function applyTheme(t){
  localStorage.setItem('ttpu-theme',t);
  document.documentElement.setAttribute('data-theme',t);
  const btn=document.getElementById('theme-btn');
  if(btn) btn.textContent = t==='dark' ? '🌙' : '☀️';
}
function toggleTheme(){
  applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');
}
function setLang(l){
  localStorage.setItem('ttpu-lang',l);
  document.querySelectorAll('[data-l]').forEach(b=>b.classList.toggle('active',b.dataset.l===l));
}
applyTheme(localStorage.getItem('ttpu-theme')||'light');
const _sl=localStorage.getItem('ttpu-lang')||'ru';
document.querySelectorAll('[data-l]').forEach(b=>b.classList.toggle('active',b.dataset.l===_sl));
</script>
